<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Judy's Website!</title>

  <link rel="icon" type="image/png" href="photos/jaye1.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Mogra&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: url("photos/landing.png") no-repeat center center/cover;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      overflow: hidden;
      position: relative;
      color: white;
    }

    body::before {
      content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to left, rgba(5, 10, 20, 0.35), rgba(5, 10, 20, 0.05));
  z-index: 0;
    }

    body::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      right: 12%;
      top: 18%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(111, 184, 255, 0.22), transparent 65%);
      filter: blur(20px);
      z-index: 0;
    }

    .right-panel {
      position: relative;
      z-index: 1;
      width: min(42%, 520px);
      margin-right: 5%;
      padding: 40px 30px;
      border-radius: 28px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.14),
        rgba(255, 255, 255, 0.06)
      );
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
      text-align: center;
      overflow: hidden;
    }

    .right-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0.15) 0%,
        rgba(255, 255, 255, 0.03) 30%,
        transparent 55%
      );
      pointer-events: none;
    }

    .right-panel::after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      pointer-events: none;
    }

    h1 {
  font-family: "Limelight", serif;
  font-size: clamp(2.2rem, 4vw, 3.2rem);
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-shadow: 0 0 14px rgba(255, 255, 255, 0.25);
}

h2 {
  font-family: "Italiana", serif;
  font-size: 1.4rem;
  letter-spacing: 6px;
  margin-bottom: 14px;
  color: rgba(255, 255, 255, 0.9);
}

.tags {
  font-family: "Mogra", cursive;
  font-size: 1.05rem;
  line-height: 1.8;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 28px;
}

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .btn {
      display: block;
      text-decoration: none;
      text-align: center;
      color: white;
      font-family: "Inria Serif", serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.17),
        rgba(255,255,255,0.07)
      );
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 8px 18px rgba(0,0,0,0.16);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      background: linear-gradient(
        135deg,
        rgba(120, 190, 255, 0.26),
        rgba(255, 255, 255, 0.12)
      );
      box-shadow:
        0 10px 26px rgba(80, 150, 255, 0.22),
        0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-portfolio {
      font-family: "Mogra", cursive;
      color: #091224;
      border: none;
      background: linear-gradient(
        90deg,
        #ff92d8,
        #b18cff,
        #6ccfff,
        #72ffd7,
        #ffd66e
      );
      background-size: 300% 300%;
      box-shadow:
        0 0 24px rgba(123, 199, 255, 0.38),
        0 12px 28px rgba(124, 120, 255, 0.26);
      animation: shift 8s ease infinite;
    }

    .btn-portfolio:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow:
        0 0 32px rgba(141, 222, 255, 0.52),
        0 16px 34px rgba(140, 104, 255, 0.3);
    }

    @keyframes shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .divider {
      width: 70px;
      height: 2px;
      margin: 0 auto 22px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.85), transparent);
      border-radius: 2px;
    }

    @media (max-width: 900px) {
      body {
        justify-content: center;
        padding: 20px;
      }

      .right-panel {
        width: 100%;
        max-width: 540px;
        margin-right: 0;
      }
    }
  </style>
</head>
<body>

  <div class="right-panel">
    <h1>Judy Henry Diaz</h1>
    <h2>Jaye</h2>
    <div class="divider"></div>
    <div class="tags">✦ Front End Dev ✦ Full Stack Dev ✦ Creative ✦</div>

    <div class="buttons">
      <a href="JPHD-Resume.pdf" class="btn" target="_blank">Resume</a>
      <a href="https://linkedin.com/in/judyhenry" class="btn" target="_blank">LinkedIn</a>
      <a href="https://github.com/Jayetech-dev" class="btn" target="_blank">GitHub</a>
      <a href="mailto:judypat99@gmail.com" class="btn">Email</a>
      <a href="portfolio.html" class="btn btn-portfolio">Proceed to Portfolio →</a>
    </div>
  </div>

</body>
</html>
