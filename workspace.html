<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Jaye Tech | Workspace</title>

    <link rel="icon" type="image/png" href="photos/jaye-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">

    <header class="workspace-header">
        <a href="index.html" class="back-link">← Back Home</a>

        <div class="workspace-heading">
            <h1>Jaye’s Workspace</h1>
            <p>drag to explore ✦ drag scraps to rearrange ✦ click to open</p>
            <p>~web only~</p>
        </div>
    </header>

    <main class="workspace-viewport" id="workspaceViewport">
        <div class="workspace-board" id="workspaceBoard">
            <div class="board-sticker sticker-1">Raspberry Pi</div>
            <div class="board-sticker sticker-2">scraps</div>
            <div class="board-sticker sticker-3">work in progress</div>
        </div>
    </main>

    <div class="post-modal hidden" id="postModal">
        <div class="post-modal-box">
            <button class="post-modal-close" id="postModalClose" aria-label="Close popup">×</button>
            <div id="postModalContent"></div>
        </div>
    </div>
